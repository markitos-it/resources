name: appsec

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # ─────────────────────────────────────────────
  # 🔐 SECRETS — Gitleaks (historial completo)
  # ─────────────────────────────────────────────
  secrets:
    name: 🔐 Secrets (Gitleaks)
    runs-on: ubuntu-latest
    concurrency:
      group: appsec-secrets-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # 🐚 BASH — ShellCheck (scripts .sh)
  # ─────────────────────────────────────────────
  bash-lint:
    name: 🐚 Bash Lint (ShellCheck)
    runs-on: ubuntu-latest
    concurrency:
      group: appsec-bash-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          find . -type f -name "*.sh" -print0 \
            | xargs -0 -r shellcheck -S warning --color=always

  # ─────────────────────────────────────────────
  # ⚙️  WORKFLOWS — actionlint + Zizmor
  # ─────────────────────────────────────────────
  workflow-lint:
    name: ⚙️ Workflow Lint (actionlint)
    runs-on: ubuntu-latest
    concurrency:
      group: appsec-actionlint-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: actionlint
        uses: rhysd/actionlint@v1

  workflow-security:
    name: ⚙️ Workflow Security (Zizmor)
    runs-on: ubuntu-latest
    concurrency:
      group: appsec-zizmor-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Zizmor
        uses: woodruffw/zizmor-action@v1

  # ─────────────────────────────────────────────
  # 📄 YAML — yamllint
  # ─────────────────────────────────────────────
  yaml-lint:
    name: 📄 YAML Lint (yamllint)
    runs-on: ubuntu-latest
    concurrency:
      group: appsec-yaml-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: yamllint
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y yamllint
          yamllint .

  # ─────────────────────────────────────────────
  # 🏗️  IAC/CONFIG — Trivy (misconfig + SARIF)
  # ─────────────────────────────────────────────
  config-scan:
    name: 🏗️ IaC Misconfig (Trivy)
    runs-on: ubuntu-latest
    concurrency:
      group: appsec-trivy-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-config

  # ─────────────────────────────────────────────
  # 🏗️  IAC/CONFIG — Checkov (complementa Trivy)
  # ─────────────────────────────────────────────
  checkov:
    name: 🏗️ IaC Security (Checkov)
    runs-on: ubuntu-latest
    concurrency:
      group: appsec-checkov-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          soft_fail: false
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
          framework: all

      - name: Upload Checkov SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  # ─────────────────────────────────────────────
  # 📊 REPO POSTURE — OpenSSF Scorecard
  # ─────────────────────────────────────────────
  scorecard:
    name: 📊 Repo Posture (OpenSSF Scorecard)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    concurrency:
      group: appsec-scorecard-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
