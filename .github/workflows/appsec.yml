name: security-arsenal
on: [push, pull_request]

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Secretos con reporte SARIF
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. El guardián de tus propias Actions
      - name: Zizmor (GitHub Actions Security)
        run: |
          pip install zizmor
          zizmor . --format sarif > zizmor.sarif
        continue-on-error: true

      # 3. Scripts de Shell
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master

      # 4. Infra y Archivos sueltos
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy.sarif'

      # 5. Centralización de resultados
      - name: Upload to Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: . # Esto subirá todos los .sarif que encuentre en el root