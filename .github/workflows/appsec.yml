name: security-arsenal
on: [push, pull_request]

permissions:
  contents: read
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        run: |
          VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r .tag_name)
          curl -LO https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION:1}_linux_x64.tar.gz
          tar -xf gitleaks_${VERSION:1}_linux_x64.tar.gz
          chmod +x gitleaks
          ./gitleaks detect --source=. -v --redact
      - name: Zizmor Audit
        run: |
          pip install zizmor
          zizmor . 
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning 
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          exit-code: '1' 
          severity: 'CRITICAL,HIGH'