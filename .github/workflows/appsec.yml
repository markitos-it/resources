name: security-arsenal
on: [push, pull_request]

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Gitleaks Scan
        run: |
          VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r .tag_name)
          curl -LO "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION:1}_linux_x64.tar.gz"
          tar -xf "gitleaks_${VERSION:1}_linux_x64.tar.gz"
          chmod +x gitleaks
          ./gitleaks detect --source=. -v --redact

      - name: Zizmor Audit
        uses: zizmorcore/zizmor-action@41215b0266e771cc24083a2d59663d2e132c3248

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@9480a055373a9073796d44f77c0500122e37905a
        with:
          severity: warning

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@18f251a5bc27e384836484e55e523f2f8428801d
        with:
          scan-type: 'fs'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'