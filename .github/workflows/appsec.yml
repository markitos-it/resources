name: security-pipeline
on: [push, pull_request]

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Gitleaks Scan
        run: docker run --rm -v ${{ github.workspace }}:/code zricethezav/gitleaks:latest detect --source="/code" --redact --no-banner

      - name: Zizmor Audit
        uses: zizmorcore/zizmor-action@5507ab0c02a9ac3996895e1598d6b3385ea7d525 # main
        with:
          persona: pedantic
          
      - name: Semgrep OSS Scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep semgrep \
            scan --config="auto" --error --quiet

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@c1824fd6edce30d7ab345a9989de00bbd46ef284 # master
        with:
          scan-type: 'fs'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          format: 'table'