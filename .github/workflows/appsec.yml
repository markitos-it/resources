name: appsec
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    name: Security & Quality Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install & Run Gitleaks
        run: |
          VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r .tag_name)
          curl -LO https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION:1}_linux_x64.tar.gz
          tar -xf gitleaks_${VERSION:1}_linux_x64.tar.gz
          chmod +x gitleaks  # <--- FUNDAMENTAL: Evita el error 126
          ./gitleaks detect --source=. -v --redact --report-format sarif --report-path gitleaks.sarif
        continue-on-error: true 

      - name: ShellCheck (Scripts & Snippets)
        uses: ludeeus/action-shellcheck@master
        continue-on-error: true

      - name: Upload results to Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() 
        with:
          sarif_file: gitleaks.sarif