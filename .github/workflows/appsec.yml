name: gitleaks
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read        # Para que pueda leer el código y el historial
  pull-requests: write  # Para que pueda comentar en los PRs si encuentra fugas
  security-events: write # Opcional: para que aparezca en la pestaña "Security" de GitHub

jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}