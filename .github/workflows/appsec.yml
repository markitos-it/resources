name: gitleaks
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  # La permisión 'security-events: write' permite que el workflow escriba eventos de seguridad
  # en GitHub. Esto es necesario para que los resultados de análisis de seguridad (como SAST,
  # DAST, dependencias vulnerables, etc.) aparezcan en la pestaña "Security" del repositorio.
  # Sin esta permisión, los eventos generados por herramientas de seguridad no serán visibles
  # en la interfaz de GitHub, aunque el workflow se ejecute correctamente.
  security-events: write # Opcional: para que aparezca en la pestaña "Security" de GitHub

jobs:
  secrets-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r .tag_name)
          curl -LO https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION:1}_linux_x64.tar.gz
          tar -xf gitleaks_${VERSION:1}_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
      - name: Run Gitleaks
        # Executes Gitleaks security scan with the following options:
        # - detect: Scans the repository for hardcoded secrets, API keys, tokens, and other sensitive information
        # - --source=.: Specifies the current directory as the source to scan
        # - -v: Enables verbose output to provide detailed scanning information
        # - --redact: Masks/hides the actual secret values in the output, showing only their location and type
        #            This prevents accidentally exposing real secrets in CI/CD logs or console output
        run: gitleaks detect --source=. -v --redact
