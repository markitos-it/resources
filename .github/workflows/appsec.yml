name: security-arsenal
on: [push, pull_request]

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      # zizmor:ignore[unpinned-uses]
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Gitleaks Core Scan
        run: docker run --rm -v ${{ github.workspace }}:/code zricethezav/gitleaks:latest detect --source="/code" -v --redact

      # zizmor:ignore[unpinned-uses]
      - name: Zizmor Audit
        uses: zizmorcore/zizmor-action@main

      # zizmor:ignore[unpinned-uses]
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning

      - name: Check for Go Code
        id: check_go
        run: |
          if [ -f "go.mod" ]; then
            echo "has_go=true" >> $GITHUB_OUTPUT
          else
            echo "has_go=false" >> $GITHUB_OUTPUT
          fi

      # zizmor:ignore[unpinned-uses]
      - name: Go Vulnerability Check
        if: steps:check_go.outputs.has_go == 'true'
        uses: golang/govulncheck-action@v1

      # zizmor:ignore[unpinned-uses]
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'